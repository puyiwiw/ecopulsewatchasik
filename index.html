  @media (min-width:768px){body{padding:48px 16px}}
  .container{max-width:42rem;margin:0 auto;width:100%}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:24px}
  header .spacer{width:40px}
  h1{flex:1;text-align:center;color:var(--yellow);font-weight:700;letter-spacing:.04em;font-size:3rem}
  @media (min-width:768px){h1{font-size:3.75rem}}
  .icon-btn{width:40px;height:40px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center;color:var(--yellow);background:transparent;border:0;cursor:pointer;transition:background .2s}
  .icon-btn:hover{background:rgba(255,255,255,.2)}
  .card{background:var(--card);border-radius:24px;padding:24px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);margin-bottom:24px}
  .card:last-of-type{padding-bottom:48px}
  .card h2{text-align:center;color:var(--yellow);font-weight:600;font-size:1.5rem;margin-bottom:20px}
  form{display:flex;flex-direction:column;gap:16px}
  input[type=text]{
    width:100%;border:2px solid var(--input-border);background:transparent;color:var(--yellow);
    border-radius:9999px;padding:12px 20px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s
  }
  input[type=text]::placeholder{color:var(--placeholder)}
  input[type=text]:focus{border-color:var(--yellow)}
  .btn{
    display:flex;width:100%;align-items:center;justify-content:center;gap:12px;
    border-radius:9999px;padding:16px 24px;font-size:1.125rem;font-weight:600;font-family:inherit;
    border:0;cursor:pointer;transition:filter .2s,opacity .2s
  }
  .btn:disabled{opacity:.7;cursor:not-allowed}
  .btn-yellow{background:var(--yellow);color:var(--indigo);margin-top:8px}
  .btn-yellow:hover:not(:disabled){filter:brightness(.95)}
  .btn-indigo{background:var(--indigo);color:#fff;margin-bottom:16px}
  .btn-indigo:hover:not(:disabled){filter:brightness(1.1)}
  .status{display:flex;width:100%;align-items:center;justify-content:center;gap:12px;border-radius:9999px;padding:16px 24px;font-size:1.125rem;font-weight:600;background:var(--muted-btn);color:var(--muted-text)}
  .sensor{text-align:center}
  .sensor .value{color:var(--yellow);font-weight:700;font-size:5rem;line-height:1}
  @media (min-width:768px){.sensor .value{font-size:6rem}}
  .sensor .label{color:var(--yellow);font-weight:600;font-size:1.5rem;margin-top:12px}
  svg{width:20px;height:20px;flex-shrink:0}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 16px;border-radius:8px;font-size:.9rem;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{background:#b91c1c}
  .toast.ok{background:#15803d}
</style>
</head>

      <input type="text" id="nodePath" placeholder="Node Path" />
      <button class="btn btn-yellow" type="submit" id="connectFb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Connect to Firebase
      </button>
    </form>
  </section>

  <section class="card">
    <h2>Microbit</h2>
    <button class="btn btn-indigo" type="button" id="btBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10-5 5V2l5 5L7 17"/></svg>
      Connect
    </button>
    <div class="status" id="btStatus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 17-5 5V12l-5 5"/><path d="m2 2 20 20"/><path d="M14.5 9.5 17 7l-5-5v4.5"/></svg>
      Not Connect
    </div>
  </section>

  <section class="card">
    <h2>Live Sensor Data</h2>
    <div class="sensor">
      <div class="value" id="sensorValue">--</div>
      <div class="label">(<span id="sensorStatus">Waiting</span>)</div>
    </div>
  </section>
</div>

<script>
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function toast(msg, type){
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (type||'');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2800);
  }

  document.getElementById('cloud-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    const k=document.getElementById('apiKey').value.trim();
    const u=document.getElementById('dbUrl').value.trim();
    const n=document.getElementById('nodePath').value.trim();
    if(!k||!u||!n){toast('Please fill in API key, Database URL and Node Path.', 'err');return;}
    try{
      localStorage.setItem('ecopulse.cloudSync', JSON.stringify({apiKey:k,databaseUrl:u,nodePath:n,updatedAt:Date.now()}));
      toast('Saved cloud sync configuration.', 'ok');
    }catch(err){toast('Failed to save.', 'err');}
  });

  const saved = localStorage.getItem('ecopulse.cloudSync');
  if(saved){try{const s=JSON.parse(saved);apiKey.value=s.apiKey||'';dbUrl.value=s.databaseUrl||'';nodePath.value=s.nodePath||'';}catch{}}

  const btBtn = document.getElementById('btBtn');
  const btStatus = document.getElementById('btStatus');
  btBtn.addEventListener('click', async ()=>{
    if(!navigator.bluetooth){toast('Web Bluetooth is not available in this browser.', 'err');return;}
    btBtn.disabled = true;
    try{
      const device = await navigator.bluetooth.requestDevice({acceptAllDevices:true, optionalServices:['battery_service']});
      btStatus.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10-5 5V2l5 5L7 17"/></svg> Connect';
      toast('Connected to ' + (device.name||'Microbit') + '.', 'ok');
    }catch(err){toast(err && err.message ? err.message : 'Bluetooth request cancelled.', 'err');btBtn.disabled=false;}
  });
</script>
</body>
</html>
